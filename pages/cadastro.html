<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Search | Cadastro</title>
    <script defer type="module" src="../assets/Javascript/cadastro.js"></script>
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/css/geral.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Radio+Canada:ital,wght@0,300..700;1,300..700&family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <a href="../index.html"><img src="../assets/images/logo-sem-nome.png" alt="Logo"></a>
        <h1>Secure Search</h1>
    </header>

    <main>
        <form class="login-cadastro" id="formCadastro">
            <img src="../assets/icones/icone-perfil.svg" alt="Perfil">
            <h2>Crie uma conta</h2>

            <div class="input-box">
                <label id="labelCampo">Email</label>
                <input id="email" class="input-glass" type="email" required>
            </div>

            <div class="input-box">
                <label>Senha</label>
                <input id="senha" type="password" class="input-glass" required>
            </div>
            <button class="continuar" type="submit">Continuar</button>
            <div class="linha-login">
                <hr>
                <span>Entrar com</span>
                <hr>
            </div>

            <div class="contas">
                <button type="button" id="btnGoogle"><img src="../assets/icones/icone-google.svg"></button>
            </div>
            <a class="entrar" href="./login.html">Já tem uma conta?</a>
        </form>
    </main>
</body>
</html>
