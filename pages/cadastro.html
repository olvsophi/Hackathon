<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Search | Cadastro</title>

    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/css/geral.css">
</head>

<body>

<header>
    <img src="../assets/images/logo-sem-nome.png" alt="Logo">
    <h1>Secure Search</h1>
</header>

        <main>

        <form class="login-cadastro" id="formCadastro">

            <img src="../assets/icones/Profile Icon.svg" alt="Perfil">


            <div class="input-box">
                <label id="labelCampo">Email</label>
                <input id="email" class="input-glass" type="email" required>
            </div>

            <div class="input-box">
                <label>Senha</label>
                <input id="senha" type="password" class="input-glass" required>
            </div>

            <button class="continuar" type="submit">Continuar</button>


            <div class="linha-login">
                <hr>
                <span>Entrar com</span>
                <hr>
            </div>

            <div class="contas">
                <button type="button"><img src="../assets/icones/google-svgrepo-com.svg"></button>
                <button type="button"><img src="../assets/icones/facebook-svgrepo-com.svg"></button>
            </div>

            <a href="./login.html">Já tem uma conta?</a>

        </form>

        </main>

<script type="module" src="../assets/Javascript/cadastro.js"></script>

</body>
</html>
