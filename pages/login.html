<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Search | Login</title>
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/css/geral.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Text+Me+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Radio+Canada:ital,wght@0,300..700;1,300..700&family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./assets/icones/favicon.ico" />  
    
</head>

<body>
    <div class="popup" id="popupAviso">
        <p id="popupTexto"></p>
        <button id="popupFechar" type="button">fechar</button>
    </div>

    <header>
        <a href="../index.html"><img src="../assets/imagens/logo-sem-nome.png" alt="Logo"></a>
        <h1>Secure Search</h1>
    </header>

    <main>
        <form class="login-cadastro" id="formLogin">
            <img src="../assets/icones/icone-perfil.svg" alt="Ícone de Perfil">
            <h2>Faça login</h2>
            <div class="input-box">
                <label>Email / Usuário</label>
                <input class="input-glass" type="text" id="email">
            </div>
            <div class="input-box">
                <label>Senha</label>
                <div class="caixa-senha">
                    <input class="input-glass" type="password" id="senha">
                    <button type="button" id="alternarSenha" class="icone-olho" aria-label="Mostrar senha"></button>
                </div>
            </div>
            <button class="botao">Entrar</button>
            <div class="linha-login">
                <hr>
                <span>Faça login com</span>
                <hr>
            </div>
            <div class="contas">
                <button type="button" id="btnGoogle"><img src="../assets/icones/icone-google.svg" alt=""></button>
            </div>
            <a href="cadastro.html">Ainda não tem uma conta?</a>
        </form>
    </main>
    <script type="module" src="../assets/javascript/geral.js"></script>
    <script type="module" src="../assets/javascript/login.js"></script>
</body>
</html>
