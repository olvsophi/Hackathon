<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Search | Login</title>
    <link rel="stylesheet" href="../assets/css/login.css">
    <link rel="stylesheet" href="../assets/css/geral.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>

    <link href="https://fonts.googleapis.com/css2
    family=Inter:ital,wght@0,100..900;1,100..900&
    family=Montserrat:ital,wght@0,100..900;1,100..900&
    family=Radio+Canada:ital,wght@0,300..700;1,300..700&
    family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&
    family=Text+Me+One& 
    display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Text+Me+One&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img src="../assets/images/logo-sem-nome.png" alt="Logo">
        <h1>Secure Search</h1>
    </header>

    <main>
        <form class="login-cadastro">
            <img src="../assets/icones/Profile Icon.svg" alt="">

            <h2>Faça login</h2>

            <div class="input-box">
                <label>Email / Usuário</label>
                <input class="input-glass" type="text">
            </div>

            <div class="input-box">
                <label>Senha</label>
                <input class="input-glass" type="password">
            </div>

            <p class="esqueceu">Esqueceu a senha?</p>
            <button class="botao">Entrar</button>

            <div class="linha-login">
                <hr>
                <span>Faça login com</span>
                <hr>
            </div>


            <div class="contas">

                <button><img src="../assets/icones/google-svgrepo-com.svg" alt=""></button>
                <button><img src="../assets/icones/facebook-svgrepo-com.svg" alt=""></button>

            </div>
        </form>
    </main>

</body>
</html>
