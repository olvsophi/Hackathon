<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>
   
<header class="header">
    <img src="../assets/images/logo-sem-nome.png" class="logo">
    <h1>Secure Search</h1>
</header>
   
    <div class="login-box">

    <div class="icon-user"></div>

    <h2>Ainda não tem uma conta?</h2>

    <div class="input-group">
        <label>Email / Usuário</label>
        <input type="text">
    </div>

    <div class="input-group">
        <label>Senha</label>
        <input type="password">
    </div>

    <p class="forgot">Esqueceu a senha?</p>

    <button>Entrar</button>

    <div class="divider">
        <span>Faça login com</span>
    </div>

    <div class="social">
        <div class="google"></div>
        <div class="facebook"></div>
    </div>

</div>

</body>
</html>
